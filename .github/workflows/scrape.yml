name: Scrape FB groups

on:
  schedule:
    # Every 5 hours at minute 0 (UTC)
    - cron: "0 */5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        env:
          FB_COOKIES: ${{ secrets.FB_COOKIES }}
        run: npm run scrape

      - name: Commit updated posts
        run: |
          git config user.name "fb-scraper-bot"
          git config user.email "fb-scraper-bot@users.noreply.github.com"
          git add data/posts.json
          if git diff --cached --quiet; then
            echo "No new posts."
          else
            git commit -m "chore(scrape): refresh posts $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
